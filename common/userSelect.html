<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no" />
  <title></title>
  <!--标准mui.css-->
  <link rel="stylesheet" href="../css/mui.min.css">
  <!--App自定义的css-->
  <link rel="stylesheet" type="text/css" href="../css/app.css" />
  <!--<link rel="stylesheet" type="text/css" href="../css/mui.picker.min.css" />-->
  <style>
    .mui-btn {
      font-size: 16px;
      padding: 8px;
      margin: 3px;
    }

    h5.mui-content-padded {
      margin-left: 3px;
      margin-top: 20px !important;
    }

    h5.mui-content-padded:first-child {
      margin-top: 12px !important;
    }

    .ui-alert {
      text-align: center;
      padding: 20px 10px;
      font-size: 16px;
    }
  </style>
</head>

<body>
  <header class="mui-bar mui-bar-nav">
    <a class="mui-action-back mui-icon mui-icon-left-nav mui-pull-left"></a>
    <h1 class="mui-title">select（用户|部门选择）</h1>
  </header>
  <div class="mui-content">
    <div class="mui-content-padded">
      <h5 class="mui-content-padded">示例(selectEnterpriseContact)</h5>
      <button id='multipleChoice' class="mui-btn mui-btn-block" type='button'>用户多选</button>
      <button id='singleChoice' class="mui-btn mui-btn-block" type='button'>用户单选</button>

      <h5 class="mui-content-padded">选择用户为：<br /><br />
        <pre id="choiceUsers"></pre>
      </h5>

      <br />
      <br />

      <button id='multipleChoiceDepartment' class="mui-btn mui-btn-block" type='button'>部门多选</button>
      <button id='singleChoiceDepartment' class="mui-btn mui-btn-block" type='button'>部门单选</button>


      <h5 class="mui-content-padded">选择部门为：<br /><br />
        <pre id="choiceDepartment"></pre>
      </h5>

    </div>
  </div>
  <script src="../js/mui.min.js"></script>

  <script src="../wx/uap.js"></script>
  <script>
    uap.ready(function () {
      //页面加载完的直接调用的方法
      console.log("fdsafsdafsdafsdafsafasdfa")

    })


    mui('body').on('click', '#multipleChoice', function () {
      wx.invoke("selectEnterpriseContact", {
        fromDepartmentId: -1, // 必填，-1表示打开的通讯录从自己所在部门开始展示, 0表示从最上层开始
        mode: "multi", // 必填，选择模式，single表示单选，multi表示多选
        type: ["user"], // 必填，选择限制类型，指定department、user中的一个或者多个
        selectedUserIds: [], // 非必填，已选用户ID列表。用于多次选人时可重入

      }, function (res) {
        console.log(res);
        mui('#choiceUsers')[0].innerHTML = JSON.stringify(res.result.userList, null, 4);
      });


    })


    mui('body').on('click', '#singleChoice', function () {
      wx.invoke("selectEnterpriseContact", {
        fromDepartmentId: -1, // 必填，-1表示打开的通讯录从自己所在部门开始展示, 0表示从最上层开始
        mode: "single", // 必填，选择模式，single表示单选，multi表示多选
        type: ["user"], // 必填，选择限制类型，指定department、user中的一个或者多个
        selectedUserIds: [], // 非必填，已选用户ID列表。用于多次选人时可重入
      }, function (res) {
        console.log(res);
        mui('#choiceUsers')[0].innerHTML = JSON.stringify(res.result.userList, null, 4);
      });


    })

    mui('body').on('click', '#multipleChoiceDepartment', function () {
      wx.invoke("selectEnterpriseContact", {
        fromDepartmentId: -1, // 必填，-1表示打开的通讯录从自己所在部门开始展示, 0表示从最上层开始
        mode: "multi", // 必填，选择模式，single表示单选，multi表示多选
        type: ["department"], // 必填，选择限制类型，指定department、user中的一个或者多个
        selectedUserIds: [], // 非必填，已选用户ID列表。用于多次选人时可重入

      }, function (res) {
        console.log(res);
        mui('#choiceDepartment')[0].innerHTML = JSON.stringify(res.result.departmentList, null, 4);
      });


    })


    mui('body').on('click', '#singleChoiceDepartment', function () {
      wx.invoke("selectEnterpriseContact", {
        fromDepartmentId: -1, // 必填，-1表示打开的通讯录从自己所在部门开始展示, 0表示从最上层开始
        mode: "single", // 必填，选择模式，single表示单选，multi表示多选
        type: ["department"], // 必填，选择限制类型，指定department、user中的一个或者多个
        selectedUserIds: [], // 非必填，已选用户ID列表。用于多次选人时可重入
      }, function (res) {
        console.log(res);
        mui('#choiceDepartment')[0].innerHTML = JSON.stringify(res.result.departmentList, null, 4);
      });


    })
  </script>
</body>

</html>

<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no" />
  <title></title>
  <!--标准mui.css-->
  <link rel="stylesheet" href="../css/mui.min.css">
  <!--App自定义的css-->
  <link rel="stylesheet" type="text/css" href="../css/app.css" />
  <!--<link rel="stylesheet" type="text/css" href="../css/mui.picker.min.css" />-->
  <style>
    .mui-btn {
      font-size: 16px;
      padding: 8px;
      margin: 3px;
    }

    h5.mui-content-padded {
      margin-left: 3px;
      margin-top: 20px !important;
    }

    h5.mui-content-padded:first-child {
      margin-top: 12px !important;
    }

    .ui-alert {
      text-align: center;
      padding: 20px 10px;
      font-size: 16px;
    }
  </style>
</head>

<body>
  <header class="mui-bar mui-bar-nav">
    <a class="mui-action-back mui-icon mui-icon-left-nav mui-pull-left"></a>
    <h1 class="mui-title">SGMap（地图）</h1>
  </header>
  <div class="mui-content">
    <div class="mui-content-padded">
      <h5 class="mui-content-padded">示例(SGMap)</h5>
      <button id='initMap' class="mui-btn mui-btn-block" type='button'>初始化地图</button>
      <h5 class="mui-content-padded"><br /><span id="initMapResult"></span></h5>
      <button id='openMap' class="mui-btn mui-btn-block" type='button'>打开地图</button>
      <br />
      <button id='closeMap' class="mui-btn mui-btn-block" type='button'>关闭地图</button>

    </div>
  </div>
  <script src="../js/mui.min.js"></script>

  <script src="../wx/uap.js"></script>
  <script>
    uap.ready(function () {
      //页面加载完的直接调用的方法

    })


    mui('body').on('click', '#initMap', function () {
      top.uexSGMap.map_Init(function (res) {
        console.log(res);
        mui('#initMapResult')[0].innerHTML = JSON.stringify(res);
      });


    })


    mui('body').on('click', '#openMap', function () {
      var heightSize = document.documentElement.clientHeight * 2 / 3;
      var widthSize = document.documentElement.clientWidth * 2 / 3;
      top.uexSGMap.map_Operation("open", {
        "left": 100,
        "top": 100,
        "width": widthSize,
        "height": heightSize,
        "lng": 116.397228,
        "lat": 39.909604
      }, function (res) {
        console.log(res);
        // mui('#choiceUsers')[0].innerHTML = JSON.stringify(res.result.userList);
      });


    })

    mui('body').on('click', '#closeMap', function () {
      top.uexSGMap.map_Operation("close", {}, function (res) {
        console.log(res);
        // mui('#choiceUsers')[0].innerHTML = JSON.stringify(res.result.userList);
      });


    })
  </script>
</body>

</html>

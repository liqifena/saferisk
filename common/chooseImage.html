<!DOCTYPE html>
<html>

	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no" />
		<title></title>
		<!--标准mui.css-->
		<link rel="stylesheet" href="../css/mui.min.css">
		<!--App自定义的css-->
		<link rel="stylesheet" type="text/css" href="../css/app.css" />
		<!--<link rel="stylesheet" type="text/css" href="../css/mui.picker.min.css" />-->
		<style>
			.mui-btn {
				font-size: 16px;
				padding: 8px;
				margin: 3px;
			}
			h5.mui-content-padded {
				margin-left: 3px;
				margin-top: 20px !important;
			}
			h5.mui-content-padded:first-child {
				margin-top: 12px !important;
			}
			.ui-alert {
				text-align: center;
				padding: 20px 10px;
				font-size: 16px;
			}
		</style>
	</head>

	<body>
		<header class="mui-bar mui-bar-nav">
			<a class="mui-action-back mui-icon mui-icon-left-nav mui-pull-left"></a>
			<h1 class="mui-title">chooseImage（拍照或选择图片）</h1>
		</header>
		<div class="mui-content">
			<div class="mui-content-padded">
				<h5 class="mui-content-padded">示例</h5>
				<button id='chooseImage' class="mui-btn mui-btn-block" type='button'>拍照或从手机相册中选图接口</button>
				<h5 class="mui-content-padded">选择图片ID为：<span id="chooseImageId"></span></h5>

				<button id='openFile' class="mui-btn mui-btn-block" type='button'>预览文件</button>

			</div>
		</div>
		<script src="../js/mui.min.js"></script>

		<script src="../wx/uap.js"></script>
		<script>
			uap.ready(function(){
				//页面加载完的直接调用的方法


			})


			mui('body').on('click','#chooseImage',function(){
				console.log('tap');
				wx.chooseImage({
					count: 1, // 默认9
					sizeType: ['original', 'compressed'], // 可以指定是原图还是压缩图，默认二者都有
					sourceType: ['album', 'camera'], // 可以指定来源是相册还是相机，默认二者都有
					quality: 0.8, //压缩质量，范围0～1，数值越小，质量越低，压缩率越高（仅对jpg有效）
					success: function (res) {
						var localIds = res.localIds; // 返回选定照片的本地ID列表，localId可以作为img标签的src属性显示图片
						console.log('图片本地ID',localIds)
						mui('#chooseImageId')[0].innerHTML = localIds;
					},
					fail: function(res){
						console.log(res,"chooseImage-fail")
					}
				});
				
				
			})


			mui('body').on('click','#openFile',function(){
				console.log('tap');
				var sURL = 'http://www.cztouch.com/upfiles/soft/testpdf.pdf';
				wx.previewFile({
					url: sURL, // 需要预览文件的地址(必填，可以使用相对路径)
					name: '文档.pdf', // 需要预览文件的文件名(不填的话取url的最后部分)
					size: 1048576, // 需要预览文件的字节大小(必填)
					hidePreviewMenuList : [] // 要隐藏的菜单项，只能隐藏“传播类”和“保护类”按钮，所有menu项见附录3
				});
				
				
			})


		</script>
	</body>

</html>
